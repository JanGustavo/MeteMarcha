name: gym_tracker
description: Gym workout tracker – sem backend, sem Firebase, só SQLite.

publish_to: "none"
version: 1.6.0+20

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Database cross-platform (mobile = SQLite nativo, web = WASM) ──
  drift: ^2.20.3
  drift_flutter: ^0.2.4 # substitui sqflite; funciona na web
  sqlite3_flutter_libs: ^0.5.28 # binários nativos para Android/iOS

  # ── State management ──────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Charts ────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Audio ─────────────────────────────────────────────────────────
  audioplayers: ^6.1.0

  # ── Utils ─────────────────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^22.0.0
  shared_preferences: ^2.5.5
  http: ^1.6.0
  image_picker: ^1.2.2
  path_provider: ^2.1.5
  package_info_plus: ^8.0.0
  ota_update: ^7.1.0
  timezone: ^0.11.0
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  home_widget: ^0.9.3
  flutter_foreground_task: ^9.2.2
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/metemacha_app_icon.png"
  adaptive_icon_background: "assets/metemacha_adaptive_background.png"
  adaptive_icon_foreground: "assets/metemacha_app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/metemacha_standalone_icon.svg
    - assets/metemacha_app_icon.svg
