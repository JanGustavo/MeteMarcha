<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Background Gradient for the Squircle -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#E63E3E" />
            <stop offset="100%" stop-color="#C92A2A" />
        </linearGradient>
        <!-- Soft Glow Filter for app-like depth -->
        <filter id="appGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Main Squircle Container from image_1326a6.png -->
    <rect x="32" y="32" width="448" height="448" rx="110" ry="110" fill="url(#bgGrad)" />
    
    <!-- White Inner Flame Icon -->
    <path d="M256 112c-50 78.7-100 121.6-100 207.4 0 55.2 44.8 100 100 100s100-44.8 100-100c0-85.8-50-128.7-100-207.4zm0 264.2c-27.6 0-50-22.4-50-50 0-35.7 21.4-57.1 50-92.8 28.6 35.7 50 57.1 50 92.8 0 27.6-22.4 50-50 50z" fill="#FFFFFF" />
</svg>